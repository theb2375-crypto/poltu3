<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1F4A44"/>
      <stop offset="55%" stop-color="#173B36"/>
      <stop offset="100%" stop-color="#DD6B20"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7FD8C8"/>
      <stop offset="100%" stop-color="#3FA593"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="512" fill="url(#bg)"/>

  <!-- Ballot box (bottom shape) -->
  <g filter="url(#softShadow)">
    <rect x="272" y="470" width="480" height="340" rx="46" fill="url(#box)"/>
  </g>

  <!-- Slot notch at top of box -->
  <rect x="404" y="450" width="216" height="60" rx="18" fill="#173B36"/>

  <!-- Up arrow inside box -->
  <g fill="#FBF3E7">
    <path d="M512 560 L610 668 L556 668 L556 730 L468 730 L468 668 L414 668 Z"/>
  </g>

  <!-- Checkmark badge (top card) -->
  <g filter="url(#softShadow)">
    <rect x="372" y="238" width="280" height="252" rx="34" fill="#FBF3E7" stroke="#173B36" stroke-width="10"/>
  </g>
  <path d="M438 366 L494 422 L594 310" fill="none" stroke="url(#box)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
