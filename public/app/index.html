<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PoltuReform — Democracy, Reimagined. Contest elections, back candidates, track every rupee.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PoltuReform">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PoltuReform</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Razorpay Checkout (web): loaded up-front so PaymentService can open it
       without waiting on a script fetch. Ignored on mobile builds. -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <!-- Boot splash: shows the app logo while main.dart.js downloads, removed
       on flutter-first-frame. Inline styles so nothing else must load. -->
  <div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#101613;z-index:9999;transition:opacity .3s">
    <img src="icons/Icon-192.png" alt="PoltuReform" width="96" height="96" style="border-radius:22px;box-shadow:0 12px 40px rgba(0,0,0,.5)">
    <div style="font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#e8f5ee;font-size:20px;font-weight:800;letter-spacing:-.3px">PoltuReform</div>
    <div style="width:26px;height:26px;border:3px solid rgba(94,234,175,.25);border-top-color:#5eeaaf;border-radius:50%;animation:bootspin 1s linear infinite"></div>
  </div>
  <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('boot-splash');
      if (s) { s.style.opacity = '0'; setTimeout(function () { s.remove(); }, 300); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
